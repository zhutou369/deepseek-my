name: Gemini Auto Content Updater

on:
  # 🎯 每天北京/香港時間早上 08:12 自動觸發更新
  # 計算公式：香港時間 08:12 AM = 世界標準時間 (UTC) 00:12 AM
  schedule:
    - cron: '12 0 * * *'

  # 🎯 手動測試觸發：允許在 GitHub 介面手動點擊按鈕，並配置可輸入的數字選項
  workflow_dispatch:
    inputs:
      post_count:
        description: '本次手動測試生成的文章數量（如輸入 3 或 5）'
        required: true
        default: '5' # 手動測試時默認是一次更新 5 篇

# 🚀 2026 規範：在全局顯式注入強制使用 Node 24 的環境變量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: 'Asia/Hong_Kong' # 強制伺服器時區為香港標準時間，確保與你的站群完全對齊

# 允許機器人反向寫入倉庫的最高權限
permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出 11ty 項目的全部源碼
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. 部署最新一代的 Node.js 24 生產環境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm' # 自動緩存依賴，加速後續構建

    # 3a. 🛠️ 【安全替代方案】如果 package.json 存在，則執行 npm install
    - name: Install Existing Dependencies
      run: npm install
      if: hashFiles('package.json') != ''

    # 3b. 🛠️ 【安全替代方案】如果 package.json 不存在，則初始化
    - name: Initialize Project If Missing
      run: npm init -y
      if: hashFiles('package.json') == ''

    # 3c. 安裝核心官方 AI SDK 與 11ty 構建工具
    - name: Install Production Tools
      run: npm install @google/genai @11ty/eleventy --save-dev

    # 4. 執行機器人指令，如果是定時運行，傳入 '1'；如果是手動觸發，則認你填寫的數字
    - name: Run Gemini Content Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node autobot.js ${{ github.event.inputs.post_count || '1' }}

    # 5. 強制解鎖 node_modules 可執行特權，阻斷 Exit code 127 錯誤
    - name: Build Eleventy Site
      run: |
        chmod -R +x ./node_modules/.bin/
        npx @11ty/eleventy

    # 6. 檢查是否有新文章誕生，並自動推回 GitHub
    - name: Commit and Push Changes back to Repo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-Content-Bot"
        git config --global user.email "bot@yourdomain.com"
        
        # 只將源碼與詞庫變更推回 main 分支
        git add src/posts/ src/keywords.json
        
        # 檢查是否有代碼改變（包括 keywords.json 的減少、posts 內新 md 的增加）
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [Bot] 自動同步/手動測試：更新文章並同步詞庫"
          # 帶著特權臨時 Token 安全推回 main 分支
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          echo "✅ 成功將新文章與更新後的詞庫同步回 GitHub 倉庫！"
        else
          echo "⚠️ 檢查發現本地文件無任何變化，本次自動跳過推送。"
        fi