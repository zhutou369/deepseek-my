backend:
  name: github
  repo: zhutou369/deepseek-chat
  branch: main
  base_url: https://deepseek-chat-f27.pages.dev/
  auth_endpoint: auth

# 媒体库配置（已规范至 static 公共资源目录，防止 11ty 编译时丢失图片）
media_folder: "static/assets/img"
public_folder: "/assets/img"

# 基础配置
display_type: list
show_preview_links: false

collections:
  - name: "posts"
    label: "文章发布"
    folder: "posts"
    create: true
    # 强制文件名唯一，防止内容覆盖
    slug: "{{year}}{{month}}{{day}}-{{hour}}{{minute}}{{second}}-{{slug}}"
    fields:
      - {label: "文章标题", name: "title", widget: "string"}
      # 🌟 新增：SEO 核心简介字段，确保首页和列表页描述对齐
      - {label: "SEO 页面描述", name: "description", widget: "string"}
      - {label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss"}
      - {label: "正文内容", name: "body", widget: "markdown"}
      # 🌟 核心对齐：tags 必须是 "posts"，这样才能进入 11ty 的 collections.posts 循环体
      - {label: "标签", name: "tags", widget: "hidden", default: ["posts"]}
      # 🌟 核心对齐：layout 必须是 "post.njk"，完美套用我们新做的详情页模板
      - {label: "布局", name: "layout", widget: "hidden", default: "post.njk"}