<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Ilustrasi pemasangan Ollama DeepSeek tempatan">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="60" y="60" width="680" height="330" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#334155"/>
  <text x="80" y="110" fill="#93c5fd" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">OLLAMA LOCAL</text>
  <text x="80" y="145" fill="#f8fafc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">Ollama DeepSeek Tempatan</text>
  <text x="80" y="180" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="16">Windows · macOS · GPU / CPU</text>
  <rect x="80" y="220" width="520" height="140" rx="12" fill="#0f172a" stroke="#475569"/>
  <text x="100" y="260" fill="#22c55e" font-family="Consolas, monospace" font-size="15">$ ollama pull deepseek-r1:7b</text>
  <text x="100" y="295" fill="#e2e8f0" font-family="Consolas, monospace" font-size="15">$ ollama run deepseek-r1:7b</text>
  <text x="100" y="355" fill="#64748b" font-family="Segoe UI, sans-serif" font-size="13">Inferens tempatan di terminal</text>
</svg>
