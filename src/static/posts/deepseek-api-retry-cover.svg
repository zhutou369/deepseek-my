<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Ilustrasi ulang cuba 503 429 dan circuit breaker">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="60" y="60" width="680" height="330" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#334155"/>
  <text x="80" y="110" fill="#93c5fd" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">RETRY &amp; RESILIENCE</text>
  <text x="80" y="145" fill="#f8fafc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">503 / 429 Ulang Cuba</text>
  <text x="80" y="180" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="16">Backoff eksponen · Jitter · Circuit Breaker</text>
  <rect x="80" y="220" width="380" height="140" rx="12" fill="#1e3a5f"/>
  <text x="110" y="260" fill="#93c5fd" font-family="Consolas, monospace" font-size="16">1s → 2s → 4s + jitter</text>
  <text x="110" y="295" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="14">maxRetries = 4</text>
  <rect x="500" y="220" width="220" height="140" rx="12" fill="#78350f"/>
  <text x="530" y="285" fill="#fde68a" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700">CIRCUIT OPEN</text>
  <text x="530" y="315" fill="#fcd34d" font-family="Segoe UI, sans-serif" font-size="13">5 kegagalan → jeda 60s</text>
</svg>
