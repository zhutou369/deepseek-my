<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-label="Susunan semak masalah log masuk">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="40" y="45" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">Susunan Semak (Prioriti Tinggi → Rendah)</text>
  <rect x="40" y="70" width="720" height="52" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="102" fill="#334155" font-family="Segoe UI, sans-serif" font-size="15">1. Sahkan pintu masuk rasmi chat.deepseek.com</text>
  <rect x="40" y="132" width="720" height="52" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="164" fill="#334155" font-family="Segoe UI, sans-serif" font-size="15">2. 503 sibuk → tunggu 1–3 minit, jangan klik berulang</text>
  <rect x="40" y="194" width="720" height="52" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="226" fill="#334155" font-family="Segoe UI, sans-serif" font-size="15">3. Uji tetingkap inkognito, nyahaktifkan pemblok iklan</text>
  <rect x="40" y="256" width="720" height="52" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="288" fill="#334155" font-family="Segoe UI, sans-serif" font-size="15">4. Kosongkan cookie &amp; cache, log masuk semula</text>
  <rect x="40" y="318" width="720" height="52" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="350" fill="#334155" font-family="Segoe UI, sans-serif" font-size="15">5. Malaysia: uji rangkaian rumah Unifi/TM, elak VPN pejabat</text>
</svg>
