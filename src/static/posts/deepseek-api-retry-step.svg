<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-label="Garis masa backoff eksponen">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="40" y="45" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">Garis Masa Backoff Eksponen</text>
  <line x1="60" y1="180" x2="740" y2="180" stroke="#cbd5e1" stroke-width="4"/>
  <circle cx="100" cy="180" r="10" fill="#ef4444"/>
  <text x="75" y="160" fill="#334155" font-family="Segoe UI, sans-serif" font-size="14">Gagal</text>
  <circle cx="280" cy="180" r="10" fill="#f59e0b"/>
  <text x="255" y="160" fill="#334155" font-family="Segoe UI, sans-serif" font-size="14">Tunggu 1s</text>
  <circle cx="440" cy="180" r="10" fill="#f59e0b"/>
  <text x="415" y="160" fill="#334155" font-family="Segoe UI, sans-serif" font-size="14">Tunggu 2s</text>
  <circle cx="600" cy="180" r="10" fill="#f59e0b"/>
  <text x="575" y="160" fill="#334155" font-family="Segoe UI, sans-serif" font-size="14">Tunggu 4s</text>
  <circle cx="700" cy="180" r="10" fill="#22c55e"/>
  <text x="675" y="160" fill="#334155" font-family="Segoe UI, sans-serif" font-size="14">Berjaya</text>
  <text x="60" y="245" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700">503 Perkhidmatan tidak tersedia</text>
  <text x="60" y="275" fill="#475569" font-family="Segoe UI, sans-serif" font-size="14">Sesuai untuk retry dengan backoff</text>
  <text x="60" y="305" fill="#475569" font-family="Segoe UI, sans-serif" font-size="14">Baca header Retry-After jika ada</text>
  <text x="430" y="245" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700">429 Melebihi had kadar</text>
  <text x="430" y="275" fill="#475569" font-family="Segoe UI, sans-serif" font-size="14">Tunggu lebih lama berbanding 503</text>
  <text x="430" y="305" fill="#475569" font-family="Segoe UI, sans-serif" font-size="14">Queue + had concurrency (≤2)</text>
</svg>
