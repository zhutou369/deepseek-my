<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-label="Aliran empat langkah permohonan API Key">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="40" y="45" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">Aliran Permohonan API Key</text>
  <rect x="40" y="80" width="720" height="90" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <circle cx="80" cy="125" r="18" fill="#2563eb"/><text x="74" y="131" fill="#fff" font-size="14" font-weight="700">1</text>
  <text x="110" y="120" fill="#334155" font-size="15" font-family="Segoe UI, sans-serif">Log masuk platform pembangun</text>
  <circle cx="220" cy="125" r="18" fill="#2563eb"/><text x="214" y="131" fill="#fff" font-size="14" font-weight="700">2</text>
  <text x="250" y="120" fill="#334155" font-size="15" font-family="Segoe UI, sans-serif">Cipta projek</text>
  <circle cx="380" cy="125" r="18" fill="#2563eb"/><text x="374" y="131" fill="#fff" font-size="14" font-weight="700">3</text>
  <text x="410" y="120" fill="#334155" font-size="15" font-family="Segoe UI, sans-serif">Jana API Key</text>
  <circle cx="540" cy="125" r="18" fill="#2563eb"/><text x="534" y="131" fill="#fff" font-size="14" font-weight="700">4</text>
  <text x="570" y="120" fill="#334155" font-size="15" font-family="Segoe UI, sans-serif">Simpan ke Secret Manager</text>
  <rect x="40" y="200" width="720" height="180" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="60" y="235" fill="#1e40af" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700">Peringatan Keselamatan</text>
  <text x="60" y="265" fill="#334155" font-family="Segoe UI, sans-serif" font-size="15">• Key hanya dipaparkan sekali — jangan letak di frontend atau Git awam</text>
  <text x="60" y="295" fill="#334155" font-family="Segoe UI, sans-serif" font-size="15">• Guna Key berbeza untuk staging dan production</text>
  <text x="60" y="325" fill="#334155" font-family="Segoe UI, sans-serif" font-size="15">• Putar semula Key secara berkala dan padam Key lama</text>
</svg>
